<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantom Wild — 管理後台</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">

<!-- Firebase Compat SDK（全域可用，無 module 作用域問題） -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

    projectId: "pwweb-d2c64",
    storageBucket: "pwweb-d2c64.firebasestorage.app",
    messagingSenderId: "950190636899",
    appId: "1:950190636899:web:56ee9f6aaa81da49c05d56"
  });
  const db = firebase.firestore();
  const storage = firebase.storage();

<style>
:root{
  --black:#0e0c08;--deep:#141208;--card:#1c1a12;
  --cream:#e8dcc8;--cream2:#c8b898;
  --warm:#8a7355;--warm-dim:#5a4a30;--warm-glow:rgba(138,115,85,.12);
  --text:#b0a088;--text-dim:#5a4e38;--white:#f5efe0;
  --border:rgba(138,115,85,.15);--border-h:rgba(138,115,85,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--cream);font-family:'Noto Serif TC',serif;font-weight:300;min-height:100vh}
#loginScreen{position:fixed;inset:0;background:var(--black);z-index:999;display:flex;align-items:center;justify-content:center}
.lb{background:var(--deep);border:1px solid var(--border);padding:52px 48px;width:360px;text-align:center}
.lb-logo{font-family:'Cinzel Decorative',serif;font-size:.88rem;letter-spacing:.32em;color:var(--warm);margin-bottom:6px}
.lb-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.84rem;color:var(--text-dim);margin-bottom:32px}
.lb input{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--cream);font-family:'Noto Serif TC',serif;font-size:.88rem;padding:12px 15px;outline:none;margin-bottom:12px;transition:border-color .3s}
.lb input:focus{border-color:var(--warm)}
.lb-btn{width:100%;padding:13px;font-family:'Cormorant Garamond',serif;font-size:.88rem;letter-spacing:.28em;text-transform:uppercase;color:#12100a;background:linear-gradient(135deg,var(--cream2),var(--warm));border:none;cursor:pointer}
.lb-err{font-family:'Cormorant Garamond',serif;font-size:.8rem;color:#c0605a;margin-top:10px;display:none}
header{background:var(--deep);border-bottom:1px solid var(--border);padding:16px 36px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.h-logo{font-family:'Cinzel Decorative',serif;font-size:.8rem;letter-spacing:.28em;color:var(--warm)}
.h-btns{display:flex;gap:8px}
.h-btn{font-family:'Cormorant Garamond',serif;font-size:.75rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim);border:1px solid var(--border);padding:6px 13px;background:none;cursor:pointer;text-decoration:none;display:inline-block;transition:all .3s}
.h-btn:hover{color:var(--warm);border-color:var(--warm)}
.h-btn.danger:hover{color:#c0605a;border-color:#8b3a3a}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--deep);padding:0 36px;overflow-x:auto}
.tab{font-family:'Cormorant Garamond',serif;font-size:.84rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim);padding:14px 20px;cursor:pointer;border-bottom:2px solid transparent;transition:all .3s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none}
.tab.act{color:var(--warm);border-bottom-color:var(--warm)}
.tab:hover{color:var(--cream)}
.tbadge{background:#8b3a3a;color:#fff;font-size:.58rem;padding:1px 5px;border-radius:7px;margin-left:5px;vertical-align:middle}
.content{padding:28px 36px;max-width:1280px;margin:0 auto}
.panel{display:none}.panel.act{display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.sbox{background:var(--deep);border:1px solid var(--border);padding:18px 20px}
.sbox-n{font-family:'Cinzel Decorative',serif;font-size:1.45rem;color:var(--warm);margin-bottom:4px}
.sbox-l{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.76rem;color:var(--text-dim)}
.pgrid{display:grid;grid-template-columns:1fr 1.55fr;gap:24px;align-items:start}
.fc{background:var(--deep);border:1px solid var(--border);padding:26px}
.fc-title{font-family:'Cinzel Decorative',serif;font-size:.85rem;color:var(--white);letter-spacing:.07em;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.edit-bar{background:rgba(138,115,85,.1);border:1px solid var(--warm-dim);padding:9px 13px;margin-bottom:14px;display:none;align-items:center;justify-content:space-between;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.82rem;color:var(--warm)}
.edit-bar.show{display:flex}
.fg{margin-bottom:14px}
.fg label{display:block;font-family:'Cormorant Garamond',serif;font-size:.72rem;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px}
.fg input,.fg textarea,.fg select{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--cream);font-family:'Noto Serif TC',serif;font-size:.85rem;font-weight:300;padding:10px 13px;outline:none;transition:border-color .3s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--warm)}
.fg textarea{resize:vertical;min-height:72px}
option{background:var(--deep)}
.fgrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.action-btn{width:100%;padding:12px;font-family:'Cormorant Garamond',serif;font-size:.85rem;letter-spacing:.26em;text-transform:uppercase;color:#12100a;background:linear-gradient(135deg,var(--cream2),var(--warm));border:none;cursor:pointer;transition:all .3s;margin-top:4px}
.action-btn:disabled{opacity:.5;cursor:not-allowed}
.cancel-btn{width:100%;padding:10px;font-family:'Cormorant Garamond',serif;font-size:.8rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);border:1px solid var(--border);background:none;cursor:pointer;transition:all .3s;margin-top:6px}
.cancel-btn:hover{color:var(--cream);border-color:var(--border-h)}
/* 圖片上傳區 */
.img-zone{border:2px dashed var(--border);padding:22px 16px;text-align:center;cursor:pointer;transition:border-color .3s;margin-bottom:8px;display:block;position:relative;overflow:hidden}
.img-zone:hover{border-color:var(--warm)}
.img-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:2}
.img-zone-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.84rem;color:var(--text-dim);pointer-events:none;display:block}
.img-preview{width:100%;max-height:130px;object-fit:cover;border:1px solid var(--border);margin-top:10px;display:none}
.current-img{width:100%;height:90px;object-fit:cover;border:1px solid var(--border);margin-bottom:8px;display:none}
.file-hint{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.78rem;color:var(--warm);margin-top:6px;display:none}
/* 清單 */
.lc{background:var(--deep);border:1px solid var(--border);padding:22px}
.lc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:11px;border-bottom:1px solid var(--border)}
.lc-title{font-family:'Cinzel Decorative',serif;font-size:.82rem;color:var(--white);letter-spacing:.06em}
.lc-count{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.78rem;color:var(--text-dim)}
.list{display:flex;flex-direction:column;gap:7px;max-height:520px;overflow-y:auto}
.li{display:flex;align-items:center;gap:11px;padding:11px 13px;background:rgba(138,115,85,.04);border:1px solid var(--border);transition:border-color .3s}
.li:hover{border-color:var(--border-h)}
.li-img{width:46px;height:46px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.li-em{width:46px;height:46px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;background:#131108;flex-shrink:0;border:1px solid var(--border);filter:saturate(.5) brightness(.6)}
.li-inf{flex:1;min-width:0}
.li-nm{font-family:'Cormorant Garamond',serif;font-size:.88rem;color:var(--white);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sb{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.75rem;color:var(--text-dim)}
.li-pr{font-family:'Cormorant Garamond',serif;font-size:.9rem;font-weight:600;color:var(--warm);white-space:nowrap;margin-right:4px}
.li-bdg{font-family:'Cormorant Garamond',serif;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:#12100a;background:var(--warm);padding:2px 6px;flex-shrink:0}
.li-acts{display:flex;gap:5px;flex-shrink:0}
.li-ebtn,.li-dbtn{font-family:'Cormorant Garamond',serif;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;padding:5px 9px;cursor:pointer;border:1px solid;transition:all .3s;background:none}
.li-ebtn{color:var(--text-dim);border-color:var(--border)}
.li-ebtn:hover{color:var(--warm);border-color:var(--warm)}
.li-dbtn{color:#c0605a;border-color:rgba(139,58,58,.3)}
.li-dbtn:hover{background:rgba(139,58,58,.1)}
.empty{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--text-dim);text-align:center;padding:36px 0}
/* 訊息 */
.msg-list{display:flex;flex-direction:column;gap:11px}
.msg{background:var(--deep);border:1px solid var(--border);padding:18px 22px;transition:border-color .3s}
.msg.unread{border-left:3px solid var(--warm)}
.msg:hover{border-color:var(--border-h)}
.msg-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.msg-who{font-family:'Cinzel Decorative',serif;font-size:.75rem;color:var(--white);letter-spacing:.04em}
.msg-contact-val{font-family:'Cormorant Garamond',serif;font-size:.82rem;color:var(--warm);margin-top:3px}
.msg-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.msg-time{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.72rem;color:var(--text-dim)}
.msg-dot{width:7px;height:7px;border-radius:50%;background:var(--warm);flex-shrink:0}
.msg-pet-ref{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.78rem;color:var(--text-dim);margin-bottom:7px}
.msg-content{font-family:'Cormorant Garamond',serif;font-size:.9rem;color:var(--text);line-height:1.7;margin-bottom:11px;padding:10px 14px;background:rgba(138,115,85,.04);border-left:2px solid var(--warm-dim)}
.msg-btns{display:flex;gap:7px;flex-wrap:wrap}
.btn-ig{font-family:'Cormorant Garamond',serif;font-size:.73rem;letter-spacing:.15em;text-transform:uppercase;color:#12100a;background:var(--warm);border:none;padding:7px 15px;cursor:pointer;text-decoration:none;display:inline-block;transition:all .3s}
.btn-ig:hover{background:var(--cream2)}
.btn-read{font-family:'Cormorant Garamond',serif;font-size:.73rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);border:1px solid var(--border);background:none;padding:7px 13px;cursor:pointer;transition:all .3s}
.btn-read:hover{color:var(--cream);border-color:var(--border-h)}
.btn-del{font-family:'Cormorant Garamond',serif;font-size:.73rem;letter-spacing:.14em;text-transform:uppercase;color:#c0605a;border:1px solid rgba(139,58,58,.3);background:none;padding:7px 13px;cursor:pointer;transition:all .3s}
.btn-del:hover{background:rgba(139,58,58,.1)}
.no-msg{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--text-dim);text-align:center;padding:56px 0}
.banner-preview{width:100%;height:180px;object-fit:cover;border:1px solid var(--border);margin-bottom:14px;display:block;background:#131108}
.banner-empty{width:100%;height:180px;background:#131108;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--text-dim)}
.toast{position:fixed;bottom:26px;right:26px;background:var(--deep);border:1px solid var(--warm);padding:12px 20px;font-family:'Cormorant Garamond',serif;font-size:.85rem;color:var(--warm);letter-spacing:.1em;z-index:9999;transform:translateY(80px);opacity:0;transition:all .35s;max-width:320px;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:900px){
  .pgrid{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr 1fr}
  .content{padding:20px 16px}
  .tabs{padding:0 16px}
  header{padding:14px 16px}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="lb">
    <div class="lb-logo">PHANTOM WILD</div>
    <div class="lb-sub">管理員登入</div>
    <input type="password" id="pwInput" placeholder="請輸入管理密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lb-btn" onclick="doLogin()">登入後台</button>
    <div class="lb-err" id="loginErr">密碼錯誤，請再試一次</div>
  </div>
</div>

<div id="mainApp" style="display:none">
  <header>
    <div class="h-logo">PHANTOM WILD — 管理後台</div>
    <div class="h-btns">
      <a href="index.html" target="_blank" class="h-btn">前往網站 ↗</a>
      <button class="h-btn danger" onclick="doLogout()">登出</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab act" onclick="switchTab('pets',this)">🦎 寵物管理</button>
    <button class="tab" onclick="switchTab('supplies',this)">🌿 用品管理</button>
    <button class="tab" onclick="switchTab('inquiries',this)">📩 寵物詢問 <span class="tbadge" id="inqBadge" style="display:none">0</span></button>
    <button class="tab" onclick="switchTab('contacts',this)">✉️ 聯絡表單 <span class="tbadge" id="ctBadge" style="display:none">0</span></button>
    <button class="tab" onclick="switchTab('banner',this)">🖼️ 廣告照片</button>
  </div>

  <div class="content">
    <div class="stats">
      <div class="sbox"><div class="sbox-n" id="stPets">—</div><div class="sbox-l">現有寵物</div></div>
      <div class="sbox"><div class="sbox-n" id="stSupp">—</div><div class="sbox-l">現有用品</div></div>
      <div class="sbox"><div class="sbox-n" id="stInq">—</div><div class="sbox-l">未讀詢問</div></div>
      <div class="sbox"><div class="sbox-n" id="stCt">—</div><div class="sbox-l">未讀聯絡</div></div>
    </div>

    <!-- PETS -->
    <div class="panel act" id="panel-pets">
      <div class="pgrid">
        <div class="fc">
          <div class="fc-title"><span id="petFormTitle">新增個體</span></div>
          <div class="edit-bar" id="editBar">✏️ 編輯模式中
            <button class="cancel-btn" style="width:auto;padding:4px 10px;margin:0" onclick="cancelEditPet()">取消</button>
          </div>
          <div class="fg"><label>個體名稱 *</label><input id="pName" placeholder="例：Lemon Frost"></div>
          <div class="fgrow">
            <div class="fg"><label>分類 *</label>
              <select id="pCat">
                <option value="gecko">守宮 · 蜥蜴</option>
                <option value="snake">蛇類</option>
                <option value="frog">青蛙 · 兩棲</option>
              </select>
            </div>
            <div class="fg"><label>價格 NT$ *</label><input type="number" id="pPrice" placeholder="3800"></div>
          </div>
          <div class="fg"><label>學名 / 品種</label><input id="pSpecies" placeholder="例：豹紋守宮"></div>
          <div class="fg"><label>標籤（逗號分隔）</label><input id="pTags" placeholder="CB個體, 雌性, 已開食"></div>
          <div class="fgrow">
            <div class="fg"><label>標記</label>
              <select id="pBadge">
                <option value="">無</option>
                <option value="精選">精選</option>
                <option value="推薦">推薦</option>
                <option value="稀有">稀有</option>
                <option value="新到">新到</option>
                <option value="售出">售出</option>
              </select>
            </div>
            <div class="fg"><label>Emoji 圖示</label><input id="pEmoji" placeholder="🦎" value="🦎"></div>
          </div>
          <div class="fg"><label>備註說明</label><textarea id="pNote" placeholder="個體補充說明..."></textarea></div>
          <div class="fg">
            <label>個體照片</label>
            <img id="pCurrentImg" class="current-img" alt="目前照片">
            <label class="img-zone" for="pImgFile">
              <input type="file" id="pImgFile" accept="image/*" onchange="previewImg(this,'pImgPreview','pCurrentImg','pHint')">
              <span class="img-zone-label">📷 點擊選擇照片（JPG / PNG）</span>
              <img id="pImgPreview" class="img-preview">
            </label>
            <div class="file-hint" id="pHint"></div>
          </div>
          <button class="action-btn" id="petSaveBtn" onclick="savePet()">新增個體</button>
          <button class="cancel-btn" id="petCancelBtn" style="display:none" onclick="cancelEditPet()">取消編輯</button>
        </div>
        <div class="lc">
          <div class="lc-head">
            <div class="lc-title">個體列表</div>
            <div class="lc-count" id="petCount">連線中…</div>
          </div>
          <div class="list" id="petList"><div class="empty">連線中，請稍候…</div></div>
        </div>
      </div>
    </div>

    <!-- SUPPLIES -->
    <div class="panel" id="panel-supplies">
      <div class="pgrid">
        <div class="fc">
          <div class="fc-title"><span id="suppFormTitle">新增用品</span></div>
          <div class="edit-bar" id="editBarSupp">✏️ 編輯模式中
            <button class="cancel-btn" style="width:auto;padding:4px 10px;margin:0" onclick="cancelEditSupp()">取消</button>
          </div>
          <div class="fg"><label>商品名稱 *</label><input id="sName" placeholder="例：UVB 5.0 爬蟲燈管"></div>
          <div class="fgrow">
            <div class="fg"><label>分類</label>
              <select id="sCat">
                <option value="照明">照明</option>
                <option value="底材">底材</option>
                <option value="飼料">飼料</option>
                <option value="溫控">溫控</option>
                <option value="營養品">營養品</option>
                <option value="飼育箱">飼育箱</option>
                <option value="活體飼料">活體飼料</option>
                <option value="其他">其他</option>
              </select>
            </div>
            <div class="fg"><label>價格 NT$ *</label><input type="number" id="sPrice" placeholder="380"></div>
          </div>
          <div class="fg"><label>商品說明</label><textarea id="sDesc" placeholder="商品簡短介紹..."></textarea></div>
          <div class="fg"><label>Emoji 圖示</label><input id="sIcon" placeholder="💡" value="📦"></div>
          <button class="action-btn" id="suppSaveBtn" onclick="saveSupply()">新增用品</button>
          <button class="cancel-btn" id="suppCancelBtn" style="display:none" onclick="cancelEditSupp()">取消編輯</button>
        </div>
        <div class="lc">
          <div class="lc-head">
            <div class="lc-title">用品列表</div>
            <div class="lc-count" id="suppCount">連線中…</div>
          </div>
          <div class="list" id="suppList"><div class="empty">連線中，請稍候…</div></div>
        </div>
      </div>
    </div>

    <!-- INQUIRIES -->
    <div class="panel" id="panel-inquiries">
      <div id="inqList"><div class="no-msg">載入中...</div></div>
    </div>

    <!-- CONTACTS -->
    <div class="panel" id="panel-contacts">
      <div id="ctList"><div class="no-msg">載入中...</div></div>
    </div>

    <!-- BANNER -->
    <div class="panel" id="panel-banner">
      <div class="pgrid">
        <div class="fc">
          <div class="fc-title">更換廣告照片</div>
          <div class="fg">
            <label>目前廣告照片</label>
            <div id="bannerEmpty" class="banner-empty">目前使用預設背景</div>
            <img id="bannerCurrent" class="banner-preview" style="display:none" alt="廣告照片">
          </div>
          <div class="fg">
            <label>上傳新廣告照片</label>
            <label class="img-zone" for="bannerFile">
              <input type="file" id="bannerFile" accept="image/*" onchange="previewImg(this,'bannerPreview',null,'bannerHint')">
              <span class="img-zone-label">📷 點擊選擇（建議 1920×1080 或更寬）</span>
              <img id="bannerPreview" class="img-preview">
            </label>
            <div class="file-hint" id="bannerHint"></div>
          </div>
          <div class="fg"><label>廣告標題（選填）</label><input id="bannerTitle" placeholder="例：幻野爬蟲專賣"></div>
          <div class="fg"><label>廣告副標題（選填）</label><input id="bannerSubtitle" placeholder="例：守宮 · 蛇類 · 兩棲 · 用品"></div>
          <button class="action-btn" id="bannerSaveBtn" onclick="saveBanner()">儲存廣告設定</button>
        </div>
        <div class="fc">
          <div class="fc-title">說明</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:.92rem;color:var(--text);line-height:1.9">
            <p>上傳後廣告照片會立即顯示在官網 Hero 區塊。</p><br>
            <p>建議使用：<br>• 橫向照片（寬比高）<br>• 最小 1200px 寬<br>• 深色系照片效果最好<br>• JPG 或 PNG 格式</p><br>
            <p style="color:var(--text-dim)">照片會自動裁切並置中顯示。</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── 設定 ───
const ADMIN_PASSWORD = 'phantomwild2025';
let PETS = [], SUPPLIES = [], INQUIRIES = [], CONTACTS = [];
let _editingPetId = null, _editingSuppId = null;

// ─── 工具 ───
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3200);
}
function fmtTime(ts){
  if(!ts) return '—';
  if(ts.toDate) return ts.toDate().toLocaleString('zh-TW');
  if(ts.seconds) return new Date(ts.seconds*1000).toLocaleString('zh-TW');
  return String(ts);
}

// ─── 登入 ───
function doLogin(){
  if(document.getElementById('pwInput').value === ADMIN_PASSWORD){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    startListeners();
    loadBanner();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
function doLogout(){
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

// ─── Firebase 監聽（登入後才啟動，避免規則錯誤）───
function startListeners(){
  db.collection('pets').orderBy('createdAt','desc').onSnapshot(snap=>{
    PETS = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderPetList(); updateStats();
  }, e=>toast('⚠️ 寵物連線錯誤：'+e.message));

  db.collection('supplies').orderBy('createdAt','desc').onSnapshot(snap=>{
    SUPPLIES = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderSupplyList(); updateStats();
  }, e=>toast('⚠️ 用品連線錯誤：'+e.message));

  db.collection('inquiries').orderBy('timestamp','desc').onSnapshot(snap=>{
    INQUIRIES = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderInquiries(); updateStats();
  });

  db.collection('contacts').orderBy('timestamp','desc').onSnapshot(snap=>{
    CONTACTS = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderContacts(); updateStats();
  });
}

// ─── Tab ───
function switchTab(name, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('act'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('act'));
  btn.classList.add('act');
  document.getElementById('panel-'+name).classList.add('act');
}

// ─── 統計 ───
function updateStats(){
  document.getElementById('stPets').textContent = PETS.length;
  document.getElementById('stSupp').textContent = SUPPLIES.length;
  const ui = INQUIRIES.filter(i=>i.status!=='已讀').length;
  const uc = CONTACTS.filter(c=>c.status!=='已讀').length;
  document.getElementById('stInq').textContent = ui;
  document.getElementById('stCt').textContent = uc;
  const ib=document.getElementById('inqBadge'), cb=document.getElementById('ctBadge');
  ib.style.display=ui>0?'':'none'; ib.textContent=ui;
  cb.style.display=uc>0?'':'none'; cb.textContent=uc;
}

// ─── 圖片預覽 ───
function previewImg(input, previewId, currentId, hintId){
  if(currentId) document.getElementById(currentId).style.display='none';
  const preview=document.getElementById(previewId);
  const hint=hintId?document.getElementById(hintId):null;
  if(input.files && input.files[0]){
    const r=new FileReader();
    r.onload=e=>{
      preview.src=e.target.result; preview.style.display='block';
      if(hint){ hint.style.display='block'; hint.textContent='✅ 已選擇：'+input.files[0].name+' — 點下方按鈕即可上傳'; }
    };
    r.readAsDataURL(input.files[0]);
  }
}

// ─── 上傳到 Firebase Storage ───
async function uploadImage(file, path){
  const ref = storage.ref(path);
  const snap = await ref.put(file);
  return await snap.ref.getDownloadURL();
}

// ══════════ 寵物 ══════════
function renderPetList(){
  document.getElementById('petCount').textContent = PETS.length+' 隻';
  const el=document.getElementById('petList');
  if(!PETS.length){ el.innerHTML='<div class="empty">還沒有個體，從左側新增第一隻吧！</div>'; return; }
  el.innerHTML=PETS.map(p=>`
    <div class="li">
      ${p.imageUrl?`<img class="li-img" src="${esc(p.imageUrl)}" alt="${esc(p.name)}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`:``}
      <div class="li-em" ${p.imageUrl?'style="display:none"':''}>${p.emoji||'🦎'}</div>
      <div class="li-inf">
        <div class="li-nm">${esc(p.name)}</div>
        <div class="li-sb">${esc(p.species||'')} · ${{gecko:'守宮',snake:'蛇類',frog:'青蛙'}[p.cat]||p.cat||''}</div>
      </div>
      ${p.badge?`<div class="li-bdg">${esc(p.badge)}</div>`:''}
      <div class="li-pr">NT$ ${Number(p.price||0).toLocaleString()}</div>
      <div class="li-acts">
        <button class="li-ebtn" onclick="startEditPet('${p.id}')">編輯</button>
        <button class="li-dbtn" onclick="deletePet('${p.id}')">刪除</button>
      </div>
    </div>`).join('');
}

function startEditPet(id){
  const p=PETS.find(x=>x.id===id);
  if(!p){ toast('找不到資料'); return; }
  _editingPetId=id;
  document.getElementById('pName').value=p.name||'';
  document.getElementById('pSpecies').value=p.species||'';
  document.getElementById('pCat').value=p.cat||'gecko';
  document.getElementById('pPrice').value=p.price||'';
  document.getElementById('pTags').value=(p.tags||[]).join(', ');
  document.getElementById('pBadge').value=p.badge||'';
  document.getElementById('pEmoji').value=p.emoji||'🦎';
  document.getElementById('pNote').value=p.note||'';
  const ci=document.getElementById('pCurrentImg');
  if(p.imageUrl){ ci.src=p.imageUrl; ci.style.display='block'; } else ci.style.display='none';
  document.getElementById('pImgPreview').style.display='none';
  document.getElementById('pHint').style.display='none';
  document.getElementById('pImgFile').value='';
  document.getElementById('petFormTitle').textContent='編輯：'+p.name;
  document.getElementById('editBar').classList.add('show');
  document.getElementById('petSaveBtn').textContent='儲存變更';
  document.getElementById('petCancelBtn').style.display='block';
  // 切換到寵物 tab
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('act'));
  document.querySelectorAll('.panel').forEach(p2=>p2.classList.remove('act'));
  document.querySelector('[onclick="switchTab(\'pets\',this)"]').classList.add('act');
  document.getElementById('panel-pets').classList.add('act');
  window.scrollTo({top:0,behavior:'smooth'});
  toast('已載入個體資料，修改後點「儲存變更」');
}

function cancelEditPet(){
  _editingPetId=null;
  ['pName','pSpecies','pPrice','pTags','pNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pCat').value='gecko';
  document.getElementById('pBadge').value='';
  document.getElementById('pEmoji').value='🦎';
  document.getElementById('pCurrentImg').style.display='none';
  document.getElementById('pImgPreview').style.display='none';
  document.getElementById('pHint').style.display='none';
  document.getElementById('pImgFile').value='';
  document.getElementById('petFormTitle').textContent='新增個體';
  document.getElementById('editBar').classList.remove('show');
  document.getElementById('petSaveBtn').textContent='新增個體';
  document.getElementById('petCancelBtn').style.display='none';
}

async function savePet(){
  const name=document.getElementById('pName').value.trim();
  const price=document.getElementById('pPrice').value.trim();
  if(!name||!price){ toast('⚠️ 請填寫名稱和價格！'); return; }

  const btn=document.getElementById('petSaveBtn');
  const editId=_editingPetId; // 在任何 async 前先擷取，避免被 cancel 清空
  btn.disabled=true; btn.textContent='儲存中…';

  try{
    let imageUrl = editId ? ((PETS.find(p=>p.id===editId)||{}).imageUrl||'') : '';
    const file=document.getElementById('pImgFile').files[0];
    if(file){
      btn.textContent='上傳照片中…';
      imageUrl=await uploadImage(file, `pets/${Date.now()}_${file.name}`);
    }
    const data={
      name, price:Number(price),
      species:document.getElementById('pSpecies').value.trim(),
      cat:document.getElementById('pCat').value,
      tags:document.getElementById('pTags').value.split(',').map(t=>t.trim()).filter(Boolean),
      badge:document.getElementById('pBadge').value,
      emoji:document.getElementById('pEmoji').value||'🦎',
      note:document.getElementById('pNote').value.trim(),
      imageUrl,
    };
    if(editId){
      await db.collection('pets').doc(editId).update(data);
      toast('✅ 個體已更新！');
    } else {
      await db.collection('pets').add({...data, createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      toast('✅ 個體已新增！');
    }
    cancelEditPet();
  } catch(e){
    console.error('savePet:', e);
    toast('⚠️ 儲存失敗：'+e.message);
  }
  btn.disabled=false; btn.textContent='新增個體';
}

async function deletePet(id){
  if(!confirm('確定刪除這隻個體？')) return;
  try{
    await db.collection('pets').doc(id).delete();
    if(_editingPetId===id) cancelEditPet();
    toast('🗑️ 個體已刪除');
  } catch(e){ toast('⚠️ 刪除失敗：'+e.message); }
}

// ══════════ 用品 ══════════
function renderSupplyList(){
  document.getElementById('suppCount').textContent=SUPPLIES.length+' 項';
  const el=document.getElementById('suppList');
  if(!SUPPLIES.length){ el.innerHTML='<div class="empty">還沒有用品</div>'; return; }
  el.innerHTML=SUPPLIES.map(s=>`
    <div class="li">
      <div class="li-em">${s.icon||'📦'}</div>
      <div class="li-inf">
        <div class="li-nm">${esc(s.name)}</div>
        <div class="li-sb">${esc(s.cat||'')}</div>
      </div>
      <div class="li-pr">NT$ ${Number(s.price||0).toLocaleString()}</div>
      <div class="li-acts">
        <button class="li-ebtn" onclick="startEditSupp('${s.id}')">編輯</button>
        <button class="li-dbtn" onclick="deleteSupply('${s.id}')">刪除</button>
      </div>
    </div>`).join('');
}

function startEditSupp(id){
  const s=SUPPLIES.find(x=>x.id===id);
  if(!s){ toast('找不到資料'); return; }
  _editingSuppId=id;
  document.getElementById('sName').value=s.name||'';
  document.getElementById('sCat').value=s.cat||'照明';
  document.getElementById('sPrice').value=s.price||'';
  document.getElementById('sDesc').value=s.desc||'';
  document.getElementById('sIcon').value=s.icon||'📦';
  document.getElementById('suppFormTitle').textContent='編輯：'+s.name;
  document.getElementById('editBarSupp').classList.add('show');
  document.getElementById('suppSaveBtn').textContent='儲存變更';
  document.getElementById('suppCancelBtn').style.display='block';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('act'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('act'));
  document.querySelector('[onclick="switchTab(\'supplies\',this)"]').classList.add('act');
  document.getElementById('panel-supplies').classList.add('act');
  window.scrollTo({top:0,behavior:'smooth'});
  toast('已載入用品資料，修改後點「儲存變更」');
}

function cancelEditSupp(){
  _editingSuppId=null;
  ['sName','sPrice','sDesc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('sCat').value='照明';
  document.getElementById('sIcon').value='📦';
  document.getElementById('suppFormTitle').textContent='新增用品';
  document.getElementById('editBarSupp').classList.remove('show');
  document.getElementById('suppSaveBtn').textContent='新增用品';
  document.getElementById('suppCancelBtn').style.display='none';
}

async function saveSupply(){
  const name=document.getElementById('sName').value.trim();
  const price=document.getElementById('sPrice').value.trim();
  if(!name||!price){ toast('⚠️ 請填寫名稱和價格！'); return; }

  const btn=document.getElementById('suppSaveBtn');
  const editId=_editingSuppId;
  btn.disabled=true; btn.textContent='儲存中…';

  try{
    const data={
      name, price:Number(price),
      cat:document.getElementById('sCat').value,
      desc:document.getElementById('sDesc').value.trim(),
      icon:document.getElementById('sIcon').value||'📦',
    };
    if(editId){
      await db.collection('supplies').doc(editId).update(data);
      toast('✅ 用品已更新！');
    } else {
      await db.collection('supplies').add({...data, createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      toast('✅ 用品已新增！');
    }
    cancelEditSupp();
  } catch(e){
    console.error('saveSupply:', e);
    toast('⚠️ 儲存失敗：'+e.message);
  }
  btn.disabled=false; btn.textContent='新增用品';
}

async function deleteSupply(id){
  if(!confirm('確定刪除這項用品？')) return;
  try{
    await db.collection('supplies').doc(id).delete();
    if(_editingSuppId===id) cancelEditSupp();
    toast('🗑️ 用品已刪除');
  } catch(e){ toast('⚠️ 刪除失敗：'+e.message); }
}

// ══════════ 詢問 ══════════
function renderInquiries(){
  const el=document.getElementById('inqList');
  if(!INQUIRIES.length){ el.innerHTML='<div class="no-msg">目前沒有詢問</div>'; return; }
  el.innerHTML='<div class="msg-list">'+INQUIRIES.map(i=>`
    <div class="msg ${i.status!=='已讀'?'unread':''}">
      <div class="msg-top"><div>
        <div class="msg-who">${esc(i.name||'匿名')}</div>
        <div class="msg-contact-val">${esc(i.contact||'—')}</div>
      </div><div class="msg-right">
        ${i.status!=='已讀'?'<div class="msg-dot"></div>':''}
        <div class="msg-time">${fmtTime(i.timestamp)}</div>
      </div></div>
      <div class="msg-pet-ref">詢問個體：${esc(i.petName||'—')} ｜ ${esc(i.type||'—')}</div>
      ${i.note?`<div class="msg-content">${esc(i.note)}</div>`:''}
      <div class="msg-btns">
        <a class="btn-ig" href="https://www.instagram.com/phantom_wild/" target="_blank">📸 IG 回覆</a>
        ${i.contact&&i.contact.startsWith('@')?`<a class="btn-ig" href="https://www.instagram.com/${encodeURIComponent(i.contact.replace('@','').trim())}/" target="_blank">私訊 ${esc(i.contact)}</a>`:''}
        ${i.status!=='已讀'?`<button class="btn-read" onclick="markRead('inquiries','${i.id}')">標為已讀</button>`:''}
        <button class="btn-del" onclick="deleteMsg('inquiries','${i.id}')">刪除</button>
      </div>
    </div>`).join('')+'</div>';
}

// ══════════ 聯絡 ══════════
function renderContacts(){
  const el=document.getElementById('ctList');
  if(!CONTACTS.length){ el.innerHTML='<div class="no-msg">目前沒有聯絡表單</div>'; return; }
  el.innerHTML='<div class="msg-list">'+CONTACTS.map(c=>`
    <div class="msg ${c.status!=='已讀'?'unread':''}">
      <div class="msg-top"><div>
        <div class="msg-who">${esc(c.name||'匿名')}</div>
        <div class="msg-contact-val">${esc(c.contact||'—')}</div>
      </div><div class="msg-right">
        ${c.status!=='已讀'?'<div class="msg-dot"></div>':''}
        <div class="msg-time">${fmtTime(c.timestamp)}</div>
      </div></div>
      <div class="msg-content">${esc(c.message||'（無內容）')}</div>
      <div class="msg-btns">
        <a class="btn-ig" href="https://www.instagram.com/phantom_wild/" target="_blank">📸 IG 回覆</a>
        ${c.contact&&c.contact.startsWith('@')?`<a class="btn-ig" href="https://www.instagram.com/${encodeURIComponent(c.contact.replace('@','').trim())}/" target="_blank">私訊 ${esc(c.contact)}</a>`:''}
        ${c.status!=='已讀'?`<button class="btn-read" onclick="markRead('contacts','${c.id}')">標為已讀</button>`:''}
        <button class="btn-del" onclick="deleteMsg('contacts','${c.id}')">刪除</button>
      </div>
    </div>`).join('')+'</div>';
}

async function markRead(col,id){
  try{ await db.collection(col).doc(id).update({status:'已讀'}); toast('已標為已讀'); }
  catch(e){ toast('⚠️ 操作失敗'); }
}
async function deleteMsg(col,id){
  if(!confirm('確定刪除？')) return;
  try{ await db.collection(col).doc(id).delete(); toast('已刪除'); }
  catch(e){ toast('⚠️ 刪除失敗'); }
}

// ══════════ 廣告橫幅 ══════════
async function loadBanner(){
  try{
    const snap=await db.collection('settings').doc('hero').get();
    if(snap.exists){
      const d=snap.data();
      if(d.imageUrl){
        document.getElementById('bannerCurrent').src=d.imageUrl;
        document.getElementById('bannerCurrent').style.display='block';
        document.getElementById('bannerEmpty').style.display='none';
      }
      if(d.title) document.getElementById('bannerTitle').value=d.title;
      if(d.subtitle) document.getElementById('bannerSubtitle').value=d.subtitle;
    }
  } catch(e){ console.error('loadBanner:',e); }
}

async function saveBanner(){
  const btn=document.getElementById('bannerSaveBtn');
  btn.disabled=true; btn.textContent='儲存中…';
  try{
    const cur=document.getElementById('bannerCurrent');
    let imageUrl=(cur.style.display!=='none'&&cur.src&&cur.src.startsWith('http'))?cur.src:'';
    const file=document.getElementById('bannerFile').files[0];
    if(file){
      btn.textContent='上傳照片中…';
      imageUrl=await uploadImage(file,`banner/hero_${Date.now()}_${file.name}`);
    }
    await db.collection('settings').doc('hero').set({
      imageUrl,
      title:document.getElementById('bannerTitle').value.trim(),
      subtitle:document.getElementById('bannerSubtitle').value.trim(),
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    if(imageUrl){
      cur.src=imageUrl; cur.style.display='block';
      document.getElementById('bannerEmpty').style.display='none';
      document.getElementById('bannerPreview').style.display='none';
      document.getElementById('bannerHint').style.display='none';
    }
    toast('✅ 廣告照片已更新！官網將即時顯示');
  } catch(e){ console.error('saveBanner:',e); toast('⚠️ 儲存失敗：'+e.message); }
  btn.disabled=false; btn.textContent='儲存廣告設定';
}
</script>
</body>
