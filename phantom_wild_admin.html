<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantom Wild — 管理後台</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp, updateDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  // ★ 與 index.html 相同的 Firebase 設定
  const firebaseConfig = {
  apiKey: "AIzaSyDnUAP9JsVidvnJ3BZNwmtDWi9sm7j31iw",
  authDomain: "pwweb-d2c64.firebaseapp.com",
  projectId: "pwweb-d2c64",
  storageBucket: "pwweb-d2c64.firebasestorage.app",
  messagingSenderId: "950190636899",
  appId: "1:950190636899:web:56ee9f6aaa81da49c05d56",
  measurementId: "G-Z2H591MXFT"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);
  window.DB = db; window.STORAGE = storage;
  window.FSfns = { collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, ref, uploadBytes, getDownloadURL };

  // Listen pets
  onSnapshot(query(collection(db,'pets'), orderBy('createdAt','desc')), snap => {
    window.PETS = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderPetList();
  });
  // Listen supplies
  onSnapshot(query(collection(db,'supplies'), orderBy('createdAt','desc')), snap => {
    window.SUPPLIES = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderSupplyList();
  });
</script>
<style>
:root{
  --black:#0e0c08;--deep:#141208;--card:#1c1a12;
  --cream:#e8dcc8;--cream2:#c8b898;
  --warm:#8a7355;--warm-dim:#5a4a30;--warm-glow:rgba(138,115,85,.12);
  --text:#b0a088;--text-dim:#5a4e38;--white:#f5efe0;
  --border:rgba(138,115,85,.15);--border-h:rgba(138,115,85,.5);
  --red:#8b3a3a;--green:#3a6b3a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--cream);font-family:'Noto Serif TC',serif;font-weight:300;min-height:100vh}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--black);z-index:999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--deep);border:1px solid var(--border);padding:52px 48px;width:380px;text-align:center}
.login-logo{font-family:'Cinzel Decorative',serif;font-size:.9rem;letter-spacing:.35em;color:var(--warm);margin-bottom:8px}
.login-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.85rem;color:var(--text-dim);margin-bottom:36px}
.login-box input{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--cream);font-family:'Noto Serif TC',serif;font-size:.9rem;padding:12px 16px;outline:none;margin-bottom:14px;transition:border-color .3s}
.login-box input:focus{border-color:var(--warm)}
.login-btn{width:100%;padding:14px;font-family:'Cormorant Garamond',serif;font-size:.9rem;letter-spacing:.3em;text-transform:uppercase;color:#12100a;background:linear-gradient(135deg,var(--cream2),var(--warm));border:none;cursor:pointer;transition:all .3s}
.login-btn:hover{box-shadow:0 6px 24px rgba(138,115,85,.3)}
.login-err{font-family:'Cormorant Garamond',serif;font-size:.82rem;color:#c0605a;margin-top:10px;display:none}

/* LAYOUT */
header{background:var(--deep);border-bottom:1px solid var(--border);padding:20px 40px;display:flex;align-items:center;justify-content:space-between}
.h-logo{font-family:'Cinzel Decorative',serif;font-size:.85rem;letter-spacing:.3em;color:var(--warm)}
.h-badge{font-family:'Cormorant Garamond',serif;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);border:1px solid var(--border);padding:5px 14px}
.h-links{display:flex;gap:12px}
.h-link{font-family:'Cormorant Garamond',serif;font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;border:1px solid var(--border);padding:6px 14px;transition:all .3s}
.h-link:hover{color:var(--warm);border-color:var(--warm)}
.logout-btn{font-family:'Cormorant Garamond',serif;font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);background:none;border:1px solid var(--border);padding:6px 14px;cursor:pointer;transition:all .3s}
.logout-btn:hover{color:#c0605a;border-color:#8b3a3a}

.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--deep);padding:0 40px}
.tab{font-family:'Cormorant Garamond',serif;font-size:.88rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);padding:16px 28px;cursor:pointer;border-bottom:2px solid transparent;transition:all .3s}
.tab.act{color:var(--warm);border-bottom-color:var(--warm)}
.tab:hover{color:var(--cream)}

.content{padding:40px;max-width:1300px;margin:0 auto}
.panel{display:none}.panel.act{display:block}

/* CARDS */
.panel-grid{display:grid;grid-template-columns:1fr 1.6fr;gap:32px;align-items:start}
.form-card{background:var(--deep);border:1px solid var(--border);padding:32px}
.fc-title{font-family:'Cinzel Decorative',serif;font-size:.95rem;color:var(--white);letter-spacing:.08em;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.fg{margin-bottom:18px}
.fg label{display:block;font-family:'Cormorant Garamond',serif;font-size:.75rem;letter-spacing:.22em;color:var(--text-dim);text-transform:uppercase;margin-bottom:7px}
.fg input,.fg textarea,.fg select{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--cream);font-family:'Noto Serif TC',serif;font-size:.88rem;font-weight:300;padding:11px 14px;outline:none;transition:border-color .3s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--warm)}
.fg textarea{resize:vertical;min-height:80px}
option{background:var(--deep)}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.add-btn{width:100%;padding:14px;font-family:'Cormorant Garamond',serif;font-size:.88rem;letter-spacing:.3em;text-transform:uppercase;color:#12100a;background:linear-gradient(135deg,var(--cream2),var(--warm));border:none;cursor:pointer;transition:all .3s;margin-top:8px}
.add-btn:hover{box-shadow:0 6px 24px rgba(138,115,85,.3)}
.add-btn:disabled{opacity:.5;cursor:not-allowed}

/* LIST */
.list-card{background:var(--deep);border:1px solid var(--border);padding:28px}
.lc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.lc-title{font-family:'Cinzel Decorative',serif;font-size:.9rem;color:var(--white);letter-spacing:.08em}
.lc-count{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.82rem;color:var(--text-dim)}
.list-items{display:flex;flex-direction:column;gap:10px;max-height:520px;overflow-y:auto}
.list-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:rgba(138,115,85,.04);border:1px solid var(--border);transition:border-color .3s}
.list-item:hover{border-color:var(--border-h)}
.li-img{width:52px;height:52px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.li-emoji{width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;background:#131108;flex-shrink:0;border:1px solid var(--border);filter:saturate(.5) brightness(.6)}
.li-info{flex:1;min-width:0}
.li-name{font-family:'Cormorant Garamond',serif;font-size:.92rem;color:var(--white);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.78rem;color:var(--text-dim)}
.li-price{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:600;color:var(--warm);white-space:nowrap}
.li-del{background:none;border:1px solid rgba(139,58,58,.3);color:#c0605a;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;font-family:'Cormorant Garamond',serif;padding:6px 12px;cursor:pointer;transition:all .3s;flex-shrink:0}
.li-del:hover{background:rgba(139,58,58,.12);border-color:#c0605a}
.li-badge{font-family:'Cormorant Garamond',serif;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#12100a;background:var(--warm);padding:2px 7px;flex-shrink:0}
.empty-list{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--text-dim);text-align:center;padding:40px 0}

/* IMG UPLOAD */
.img-upload-area{border:2px dashed var(--border);padding:20px;text-align:center;cursor:pointer;transition:border-color .3s;margin-bottom:18px}
.img-upload-area:hover{border-color:var(--warm)}
.img-upload-area input{display:none}
.img-upload-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.88rem;color:var(--text-dim)}
.img-preview{width:100%;max-height:140px;object-fit:cover;border:1px solid var(--border);margin-top:10px;display:none}

/* TOAST */
.toast{position:fixed;bottom:30px;right:30px;background:var(--deep);border:1px solid var(--warm);padding:14px 22px;font-family:'Cormorant Garamond',serif;font-size:.88rem;color:var(--warm);letter-spacing:.1em;z-index:9000;transform:translateY(80px);opacity:0;transition:all .35s}
.toast.show{transform:translateY(0);opacity:1}

/* STATS BAR */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-box{background:var(--deep);border:1px solid var(--border);padding:22px 24px}
.sb-num{font-family:'Cinzel Decorative',serif;font-size:1.6rem;color:var(--warm);margin-bottom:6px}
.sb-lbl{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.8rem;color:var(--text-dim)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">PHANTOM WILD</div>
    <div class="login-sub">管理員登入</div>
    <input type="password" id="pwInput" placeholder="請輸入管理密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">登入後台</button>
    <div class="login-err" id="loginErr">密碼錯誤，請再試一次</div>
  </div>
</div>

<!-- MAIN -->
<div id="mainApp" style="display:none">
  <header>
    <div class="h-logo">PHANTOM WILD — 管理後台</div>
    <div class="h-links">
      <a href="index.html" target="_blank" class="h-link">前往網站 ↗</a>
      <button class="logout-btn" onclick="doLogout()">登出</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab act" onclick="switchTab('pets',this)">🦎 寵物管理</div>
    <div class="tab" onclick="switchTab('supplies',this)">🌿 用品管理</div>
  </div>

  <div class="content">

    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat-box"><div class="sb-num" id="stPets">0</div><div class="sb-lbl">現有寵物</div></div>
      <div class="stat-box"><div class="sb-num" id="stSupp">0</div><div class="sb-lbl">現有用品</div></div>
      <div class="stat-box"><div class="sb-num">即時</div><div class="sb-lbl">Firebase 同步</div></div>
      <div class="stat-box"><div class="sb-num">✓</div><div class="sb-lbl">網站已連線</div></div>
    </div>

    <!-- PETS PANEL -->
    <div class="panel act" id="panel-pets">
      <div class="panel-grid">
        <!-- Add pet form -->
        <div class="form-card">
          <div class="fc-title">新增寵物個體</div>
          <div class="fg"><label>個體名稱 *</label><input type="text" id="pName" placeholder="例：Lemon Frost" required></div>
          <div class="fg-row">
            <div class="fg"><label>分類 *</label>
              <select id="pCat">
                <option value="gecko">守宮 · 蜥蜴</option>
                <option value="snake">蛇類</option>
                <option value="frog">青蛙 · 兩棲</option>
              </select>
            </div>
            <div class="fg"><label>價格 (NT$) *</label><input type="number" id="pPrice" placeholder="3800"></div>
          </div>
          <div class="fg"><label>學名 / 品種</label><input type="text" id="pSpecies" placeholder="例：Eublepharis macularius"></div>
          <div class="fg"><label>標籤 (用逗號分隔)</label><input type="text" id="pTags" placeholder="CB個體, 雌性, 已開食"></div>
          <div class="fg-row">
            <div class="fg"><label>標籤顏色</label>
              <select id="pBadge">
                <option value="">無</option>
                <option value="精選">精選</option>
                <option value="推薦">推薦</option>
                <option value="稀有">稀有</option>
                <option value="售出">售出</option>
              </select>
            </div>
            <div class="fg"><label>圖示 Emoji</label><input type="text" id="pEmoji" placeholder="🦎" value="🦎"></div>
          </div>
          <div class="fg"><label>備註說明</label><textarea id="pNote" placeholder="個體的補充說明..."></textarea></div>

          <div class="img-upload-area" onclick="document.getElementById('pImgFile').click()">
            <input type="file" id="pImgFile" accept="image/*" onchange="previewImg(this,'pImgPreview')">
            <div class="img-upload-label">點擊上傳個體照片（選填）</div>
            <img id="pImgPreview" class="img-preview">
          </div>

          <button class="add-btn" onclick="addPet()" id="addPetBtn">新增個體</button>
        </div>

        <!-- Pet list -->
        <div class="list-card">
          <div class="lc-head">
            <div class="lc-title">目前個體列表</div>
            <div class="lc-count" id="petListCount">0 隻</div>
          </div>
          <div class="list-items" id="petList"><div class="empty-list">還沒有個體，新增第一隻吧！</div></div>
        </div>
      </div>
    </div>

    <!-- SUPPLIES PANEL -->
    <div class="panel" id="panel-supplies">
      <div class="panel-grid">
        <div class="form-card">
          <div class="fc-title">新增用品 / 營養品</div>
          <div class="fg"><label>商品名稱 *</label><input type="text" id="sName" placeholder="例：UVB 5.0 爬蟲燈管"></div>
          <div class="fg-row">
            <div class="fg"><label>分類</label>
              <select id="sCat">
                <option value="照明">照明</option>
                <option value="底材">底材</option>
                <option value="飼料">飼料</option>
                <option value="溫控">溫控</option>
                <option value="營養品">營養品</option>
                <option value="飼育箱">飼育箱</option>
                <option value="活體飼料">活體飼料</option>
                <option value="其他">其他</option>
              </select>
            </div>
            <div class="fg"><label>價格 (NT$) *</label><input type="number" id="sPrice" placeholder="380"></div>
          </div>
          <div class="fg"><label>商品說明</label><textarea id="sDesc" placeholder="商品的簡短介紹..."></textarea></div>
          <div class="fg"><label>圖示 Emoji</label><input type="text" id="sIcon" placeholder="💡" value="📦"></div>
          <button class="add-btn" onclick="addSupply()" id="addSuppBtn">新增用品</button>
        </div>

        <div class="list-card">
          <div class="lc-head">
            <div class="lc-title">目前用品列表</div>
            <div class="lc-count" id="suppListCount">0 項</div>
          </div>
          <div class="list-items" id="suppList"><div class="empty-list">還沒有用品，新增第一項吧！</div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── 管理密碼（請改成你自己的密碼！）──
const ADMIN_PASSWORD = 'phantomwild2025';

function doLogin(){
  const pw = document.getElementById('pwInput').value;
  if(pw === ADMIN_PASSWORD){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainApp').style.display='block';
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}
function doLogout(){
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('mainApp').style.display='none';
  document.getElementById('pwInput').value='';
}

// ── Tabs ──
function switchTab(name, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('act'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('act'));
  btn.classList.add('act');
  document.getElementById('panel-'+name).classList.add('act');
}

// ── Toast ──
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── Image preview ──
function previewImg(input, previewId){
  const preview=document.getElementById(previewId);
  if(input.files&&input.files[0]){
    const r=new FileReader();
    r.onload=e=>{preview.src=e.target.result;preview.style.display='block'};
    r.readAsDataURL(input.files[0]);
  }
}

// ── Add Pet ──
async function addPet(){
  const name=document.getElementById('pName').value.trim();
  const price=document.getElementById('pPrice').value;
  if(!name||!price){toast('請填寫名稱和價格！');return}
  const btn=document.getElementById('addPetBtn');
  btn.disabled=true;btn.textContent='上傳中…';
  try{
    const fns=window.FSfns;
    let imageUrl='';
    const file=document.getElementById('pImgFile').files[0];
    if(file&&window.STORAGE){
      const sRef=fns.ref(window.STORAGE,`pets/${Date.now()}_${file.name}`);
      await fns.uploadBytes(sRef,file);
      imageUrl=await fns.getDownloadURL(sRef);
    }
    const tags=document.getElementById('pTags').value.split(',').map(t=>t.trim()).filter(Boolean);
    await fns.addDoc(fns.collection(window.DB,'pets'),{
      name,
      species:document.getElementById('pSpecies').value.trim(),
      cat:document.getElementById('pCat').value,
      price:Number(price),
      tags,
      badge:document.getElementById('pBadge').value,
      emoji:document.getElementById('pEmoji').value||'🦎',
      note:document.getElementById('pNote').value.trim(),
      imageUrl,
      createdAt:fns.serverTimestamp()
    });
    // Reset
    ['pName','pSpecies','pTags','pNote','pEmoji'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('pPrice').value='';
    document.getElementById('pBadge').value='';
    document.getElementById('pEmoji').value='🦎';
    document.getElementById('pImgFile').value='';
    document.getElementById('pImgPreview').style.display='none';
    toast('✅ 個體已新增！');
  } catch(e){
    console.error(e);
    toast('⚠️ 新增失敗，請確認 Firebase 設定');
  }
  btn.disabled=false;btn.textContent='新增個體';
}

// ── Add Supply ──
async function addSupply(){
  const name=document.getElementById('sName').value.trim();
  const price=document.getElementById('sPrice').value;
  if(!name||!price){toast('請填寫名稱和價格！');return}
  const btn=document.getElementById('addSuppBtn');
  btn.disabled=true;btn.textContent='新增中…';
  try{
    const fns=window.FSfns;
    await fns.addDoc(fns.collection(window.DB,'supplies'),{
      name,
      cat:document.getElementById('sCat').value,
      price:Number(price),
      desc:document.getElementById('sDesc').value.trim(),
      icon:document.getElementById('sIcon').value||'📦',
      createdAt:fns.serverTimestamp()
    });
    ['sName','sDesc','sIcon'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('sPrice').value='';
    document.getElementById('sIcon').value='📦';
    toast('✅ 用品已新增！');
  } catch(e){
    console.error(e);
    toast('⚠️ 新增失敗，請確認 Firebase 設定');
  }
  btn.disabled=false;btn.textContent='新增用品';
}

// ── Delete ──
async function deletePet(id){
  if(!confirm('確定要刪除這隻個體嗎？'))return;
  await window.FSfns.deleteDoc(window.FSfns.doc(window.DB,'pets',id));
  toast('🗑️ 個體已刪除');
}
async function deleteSupply(id){
  if(!confirm('確定要刪除這項用品嗎？'))return;
  await window.FSfns.deleteDoc(window.FSfns.doc(window.DB,'supplies',id));
  toast('🗑️ 用品已刪除');
}

// ── Render Lists ──
window.PETS=[];window.SUPPLIES=[];

function renderPetList(){
  const d=window.PETS||[];
  document.getElementById('stPets').textContent=d.length;
  document.getElementById('petListCount').textContent=d.length+' 隻';
  const el=document.getElementById('petList');
  if(!d.length){el.innerHTML='<div class="empty-list">還沒有個體，新增第一隻吧！</div>';return}
  el.innerHTML=d.map(p=>`
    <div class="list-item">
      ${p.imageUrl?`<img class="li-img" src="${p.imageUrl}" alt="${p.name}">`:`<div class="li-emoji">${p.emoji||'🦎'}</div>`}
      <div class="li-info">
        <div class="li-name">${p.name}</div>
        <div class="li-sub">${p.species||''} · ${p.cat==='gecko'?'守宮':p.cat==='snake'?'蛇類':'青蛙'}</div>
      </div>
      ${p.badge?`<div class="li-badge">${p.badge}</div>`:''}
      <div class="li-price">NT$ ${Number(p.price).toLocaleString()}</div>
      <button class="li-del" onclick="deletePet('${p.id}')">刪除</button>
    </div>`).join('');
}

function renderSupplyList(){
  const d=window.SUPPLIES||[];
  document.getElementById('stSupp').textContent=d.length;
  document.getElementById('suppListCount').textContent=d.length+' 項';
  const el=document.getElementById('suppList');
  if(!d.length){el.innerHTML='<div class="empty-list">還沒有用品，新增第一項吧！</div>';return}
  el.innerHTML=d.map(s=>`
    <div class="list-item">
      <div class="li-emoji">${s.icon||'📦'}</div>
      <div class="li-info">
        <div class="li-name">${s.name}</div>
        <div class="li-sub">${s.cat||''}</div>
      </div>
      <div class="li-price">NT$ ${Number(s.price).toLocaleString()}</div>
      <button class="li-del" onclick="deleteSupply('${s.id}')">刪除</button>
    </div>`).join('');
}
</script>
</body>
</html>
